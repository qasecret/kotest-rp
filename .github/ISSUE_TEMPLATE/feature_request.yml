name: Feature request
description: Suggest an enhancement or new capability for kotest-rp.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! kotest-rp aims to stay small and focused (minimal dependencies, no bundled
        logging backend, non-fatal reporting) — please keep that in mind when proposing changes.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like kotest-rp to do? An `RpConfig` option, a new mapping, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other approaches you weighed.
    validations:
      required: false
