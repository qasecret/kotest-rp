name: Publish

# Automatic release: pushing a version tag (e.g. v1.1.0) builds, signs and releases that version to
# Maven Central. The version is taken from the tag. A manual run (workflow_dispatch) can publish an
# explicit version instead.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.1.0)'
        required: true

jobs:
  publish:
    name: Release build and publish
    runs-on: macOS-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Publish and release to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          # Empty on tag pushes (version then comes from the tag via GITHUB_REF); set on manual runs.
          VERSION: ${{ github.event.inputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
      - name: Create GitHub Release
        # Only for tag pushes; idempotent so a manually-created release isn't recreated.
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --repo "$GITHUB_REPOSITORY" \
                 --title "${GITHUB_REF_NAME#v}" \
                 --generate-notes \
                 --latest
